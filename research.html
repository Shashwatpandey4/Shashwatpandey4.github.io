---
layout: default
title: Blog Posts
---

<div class="blog-posts">
  <h1>{{ page.title }}</h1>
  <ul class="post-list">
    {% for post in site.research %}
      <li>
        <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
        <p class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</p>
        <p>{{ post.excerpt }}</p>
      </li>
    {% endfor %}
  </ul>
</div>

<!-- Create similar files for projects.html and research.html, 
     replacing 'site.posts' with 'site.projects' or 'site.research' respectively -->
