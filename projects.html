---
layout: default
title: Projects 
---

<div class="container"></div>
  <div class="blog-list">
    <h1>{{ page.title }}</h1>

    <ul class="post-list">
      {% for post in site.projects %}
      <li>
        <img src="{{ project.image | relative_url }}" alt="{{ project.title }}" class="project-image">
        <a href="{{ project.url | relative_url }}" class="project-name">{{ project.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
