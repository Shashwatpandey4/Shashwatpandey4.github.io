---
layout: default
title: Projects 
---

<div class="container"></div>
  <div class="blog-list">
    <h1>{{ projects.title }}</h1>

    <ul class="post-list">
      {% for post in site.projects %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
