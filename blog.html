---
layout: default
title: Blog Posts
---

<div class="container">
  <div class="blog-list">
    <h1>{{ page.title }}</h1>

    <ul class="post-list">
      {% for post in site.posts %}
        <li>
          <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
            <span class="circle"></span>
            <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
