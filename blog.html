---
layout: default
title: Blog Posts
---

<div class="container">
  <div class="blog-list">
    <h1>{{ page.title }}</h1>

    <ul class="post-list">
      {% for post in site.posts %}
        <li>
          <h4><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
          <p class="post-meta">{{ post.date | date: "%B %d, %Y" }}</p>
          {% if post.description %}
            <p class="post-description">{{ post.description }}</p>
          {% endif %}
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
