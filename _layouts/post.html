---
layout: default
---

<article class="post">
  <h1>{{ blog.title }}</h1>
  <p class="post-meta">
    Posted on {{ blog.date | date: "%B %d, %Y" }}
  </p>

  <div class="post-content">
    {{ content }}
  </div>

  <footer>
    <p>&copy; {{ site.year }} {{ site.title }}</p>
  </footer>
</article>
